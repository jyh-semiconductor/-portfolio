  <script src="data.js"></script>
  <script>
    function parseContent(text) {
      if (!text) return '';
      const blockMath = [];
      text = text.replace(/\$\$([\s\S]+?)\$\$/g, (_, expr) => { blockMath.push(expr); return `%%BLOCKMATH${blockMath.length-1}%%`; });
      const inlineMath = [];
      text = text.replace(/\$([^\$\n]+?)\$/g, (_, expr) => { inlineMath.push(expr); return `%%INLINEMATH${inlineMath.length-1}%%`; });
      const lines = text.split('\n');
      const blocks = []; let para = [];
      const flushPara = () => { if (para.length) { blocks.push(`<p>${para.join('<br/>')}</p>`); para = []; } };
      const inlineFormat = s => {
        s = s.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
        s = s.replace(/`([^`]+)`/g, '<code class="inline-code">$1</code>');
        s = s.replace(/\[([^\]]+)\]\((https?:\/\/[^\)]+)\)/g, '<a href="$2" target="_blank" rel="noopener" class="content-link">$1</a>');
        return s;
      };
      for (const raw of lines) {
        const line = raw.trimEnd();
        if (line === '') { flushPara(); continue; }
        if (/^%%BLOCKMATH\d+%%$/.test(line.trim())) { flushPara(); blocks.push(line.trim()); continue; }
        const h3m = line.match(/^### (.+)/);
        const h2m = line.match(/^## (.+)/);
        const h1m = line.match(/^# (.+)/);
        if (h3m) { flushPara(); blocks.push(`<h3 class="content-h3">${inlineFormat(h3m[1].replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'))}</h3>`); continue; }
        if (h2m) { flushPara(); blocks.push(`<h2 class="content-h2">${inlineFormat(h2m[1].replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'))}</h2>`); continue; }
        if (h1m) { flushPara(); blocks.push(`<h1 class="content-h1">${inlineFormat(h1m[1].replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'))}</h1>`); continue; }
        let parsed = line.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
        parsed = inlineFormat(parsed);
        para.push(parsed);
      }
      flushPara();
      let html = blocks.join('\n');
      html = html.replace(/%%BLOCKMATH(\d+)%%/g, (_, i) => `<div class="math-block">\\[${blockMath[i]}\\]</div>`);
      html = html.replace(/%%INLINEMATH(\d+)%%/g, (_, i) => `\\(${inlineMath[i]}\\)`);
      return html;
    }
  </script>
  <script>
    function loadData(key) {
      if (typeof STATIC_DATA !== 'undefined' && STATIC_DATA[key] && STATIC_DATA[key].length > 0) {
        return STATIC_DATA[key];
      }
      try { return JSON.parse(localStorage.getItem(key)) || []; }
      catch { return []; }
    }

    function escHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    const CATEGORY_TREE = {
      semiconductor: { label: '집적회로', subs: { process: '공정', device: '소자', circuit: '회로', physics: '물리' }},
      data:          { label: '데이터 분석', subs: { projects: 'Python 실전 프로젝트', theory: '분석 이론 및 알고리즘' }},
      quality:       { label: '품질 및 통계', subs: { 'six-sigma': '6시그마', spc: 'SPC' }},
      career:        { label: '커리어', subs: { language: '어학', certifications: '자격증', retrospect: '회고' }}
    };

    function getMajorBySub(sub) {
      for (const [major, data] of Object.entries(CATEGORY_TREE)) {
        if (data.subs[sub]) return major;
      }
      return null;
    }

    function getCategoryLabel(major, sub) {
      const m = CATEGORY_TREE[major]?.label || major || '';
      const s = CATEGORY_TREE[major]?.subs[sub] || sub || '';
      return m && s ? `${m} > ${s}` : (s || m);
    }

    const params = new URLSearchParams(location.search);
    const id     = params.get('id');

    const loading  = document.getElementById('detail-loading');
    const notfound = document.getElementById('detail-notfound');
    const content  = document.getElementById('detail-content');

    if (!id) {
      loading.style.display  = 'none';
      notfound.style.display = 'block';
    } else {
      const items = loadData('portfolio_study');
      const item  = items.find(s => s.id === id);

      loading.style.display = 'none';

      if (!item) {
        notfound.style.display = 'block';
      } else {
        document.title = item.title + ' | 전용현';

        // 카테고리 태그
        const major = item.major || getMajorBySub(item.category) || 'semiconductor';
        const sub   = item.category || '';
        document.getElementById('detail-tags').innerHTML =
          `<span class="card-tag cat-${major}">${escHtml(getCategoryLabel(major, sub))}</span>`;

        // 제목
        document.getElementById('detail-title').textContent = item.title;

        // 날짜
        if (item.date) {
          document.getElementById('detail-date').textContent = item.date;
        }

        // 요약 (desc) — 헤더 아래 리드 문장
        const summaryEl = document.getElementById('detail-summary');
        if (item.desc) {
          summaryEl.textContent = item.desc;
        } else {
          summaryEl.style.display = 'none';
        }

        // 상세 내용 — 마크다운 파싱 적용
        const bodyWrap = document.getElementById('detail-body-wrap');
        if (item.content) {
          document.getElementById('detail-body').innerHTML = parseContent(item.content);
          if (window.MathJax && MathJax.typesetPromise) MathJax.typesetPromise();
          else window.addEventListener('load', () => { if (window.MathJax && MathJax.typesetPromise) MathJax.typesetPromise(); });
        } else {
          bodyWrap.style.display = 'none';
        }

        content.style.display = 'block';
      }
    }
  </script>
</body>
